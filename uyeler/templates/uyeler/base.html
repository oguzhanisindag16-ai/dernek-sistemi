<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title|default:"Dernek Sistemi" }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background:#0f1722; color:#fff; }
    .navbar, .card, .table, .list-group-item, .form-control, .form-select, .form-control:focus, .form-select:focus {
      background:#131d2b !important; color:#fff !important; border-color:#223047 !important;
    }
    .muted { color:#9fb2cc; }
    .stat-card { border-radius:18px; padding:18px; }
    .badge-odendi { background:#00c853; color:#111; }
    .badge-odenmedi { background:#ef5350; color:#111; }
    .badge-kismi { background:#ff9800; color:#111; }
    a { text-decoration:none; }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg border-bottom border-secondary-subtle mb-4">
  <div class="container">
    <a class="navbar-brand text-white fw-bold" href="/">Dernek Sistemi</a>
    {% if request.user.is_authenticated %}
    <div class="d-flex gap-2 flex-wrap">
      <a class="btn btn-sm btn-outline-light" href="/">Ana Panel</a>
      <a class="btn btn-sm btn-outline-light" href="/uyeler/">Üyeler</a>
      <a class="btn btn-sm btn-outline-light" href="/uye-ekle/">Üye Ekle</a>
      <a class="btn btn-sm btn-outline-light" href="/duyurular/">Duyurular</a>
      <a class="btn btn-sm btn-outline-light" href="/duyuru-ekle/">Duyuru Ekle</a>
      <a class="btn btn-sm btn-danger" href="/cikis/">Çıkış</a>
    </div>
    {% endif %}
  </div>
</nav>
<div class="container pb-5">
  {% block content %}{% endblock %}
</div>
</body>
</html>
