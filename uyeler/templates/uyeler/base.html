<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Dernek Yönetim{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background:#0f1722; color:#fff; font-family:'Segoe UI',sans-serif; }
    .sidebar { background:#131d2b; min-height:100vh; padding:20px; }
    .menu-btn {
      display:block; padding:10px 12px; margin-bottom:10px;
      background:#1c2533; color:#fff; border-radius:10px; text-decoration:none;
    }
    .menu-btn:hover { background:#2b3a55; color:#fff; }
    .card { background:#131d2b; border:none; border-radius:16px; color:#fff; }
    .muted { color:#9fb2cc; }
    label { color:#dbe7ff; font-weight:600; }
    .form-control, .form-select, textarea {
      background:#fff !important; color:#111 !important;
    }
  </style>
</head>
<body>
  <div class="container-fluid">
    <div class="row">
      {% if request.user.is_authenticated %}
      <div class="col-md-2 sidebar">
        <h4 class="mb-4">DERNEK</h4>
        <a href="/" class="menu-btn">🏠 Ana Panel</a>
        <a href="/uyeler/" class="menu-btn">👥 Üyeler</a>
        <a href="/uye-ekle/" class="menu-btn">➕ Üye Ekle</a>
        <a href="/duyurular/" class="menu-btn">📢 Duyurular</a>
        <a href="/admin/" class="menu-btn">⚙️ Admin</a>
        <a href="/cikis/" class="menu-btn">🚪 Çıkış</a>
      </div>
      <div class="col-md-10 p-4">
        {% block content %}{% endblock %}
      </div>
      {% else %}
      <div class="col-12 p-4">
        {% block content %}{% endblock %}
      </div>
      {% endif %}
    </div>
  </div>
</body>
</html>
