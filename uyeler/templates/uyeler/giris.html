{% extends "uyeler/base.html" %}
{% block content %}

<div class="row justify-content-center mt-5">
  <div class="col-md-6 col-lg-5">
    <div class="card p-4 rounded-4 shadow-lg" style="background:#131d2b; border:1px solid #223047;">
      <h2 class="fw-bold text-white mb-2">Giriş Yap</h2>
      <div style="color:#9fb2cc;" class="mb-4">Dernek yönetim paneline erişin</div>

      <form method="post">
        {% csrf_token %}

        <div class="mb-3">
          <label class="form-label">Kullanıcı Adı</label>
          <input type="text" name="username" class="form-control" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Şifre</label>
          <input type="password" name="password" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-danger w-100">Giriş Yap</button>
      </form>
    </div>
  </div>
</div>

{% endblock %}
