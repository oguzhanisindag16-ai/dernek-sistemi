<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Giriş</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: #0f1722;
      color: white;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      width: 100%;
      max-width: 430px;
      background: #131d2b;
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    }
    .muted {
      color: #9fb2cc;
    }
    .form-label {
      color: #dbe7ff;
      font-weight: 600;
    }
    .form-control {
      border-radius: 12px;
      padding: 12px;
    }
    .btn-danger {
      border-radius: 12px;
      padding: 12px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <h2 class="fw-bold mb-2">Giriş Yap</h2>
    <div class="muted mb-4">Dernek yönetim paneline erişin</div>

    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label">Kullanıcı Adı</label>
        <input type="text" name="username" class="form-control" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Şifre</label>
        <input type="password" name="password" class="form-control" required>
      </div>

      <button type="submit" class="btn btn-danger w-100">Giriş Yap</button>
    </form>
  </div>
</body>
</html>
